# /etc/modules-load.d/sgil1.conf
#
# Loads the sgil1 kernel module at boot. udev would normally autoload
# it when the L1 USB device appears (the driver's MODULE_DEVICE_TABLE
# matches the L1 vendor/product), but loading it unconditionally at
# boot means /dev/sgil1_cs is present and the l2.service can probe
# the connection-status device even if the L1 is plugged in after
# the daemon starts.

sgil1
