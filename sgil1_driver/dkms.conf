# DKMS configuration for the modernized sgil1 USB driver.
#
# Used by setup-driver.sh — copied alongside the driver source into
# /usr/src/sgil1-<version>/ and registered with `dkms add/build/install`.
# This lets the module be rebuilt automatically when the kernel is
# updated (the original Makefile is fine for one-shot builds; DKMS
# just wraps it).
#
# About the `env -u KERNELRELEASE` in MAKE[0] / CLEAN:
#
# The driver's Makefile is the standard kbuild dual-mode pattern —
#
#     ifneq ($(KERNELRELEASE),)
#         obj-m := sgil1.o          (inner: invoked by kbuild, no targets)
#     else
#         modules: $(MAKE) -C $(KDIR) M=$(PWD) modules    (outer)
#     endif
#
# — which expects KERNELRELEASE to be UNSET on the first invocation
# (so the outer branch runs and recurses into the kernel build tree)
# and SET on the recursion (so the inner branch supplies obj-m).
#
# DKMS breaks this convention by exporting KERNELRELEASE in the
# environment before its very first `make` call. The Makefile then
# takes the inner branch immediately, which has no `modules` target,
# and aborts with "make: *** No targets.  Stop."
#
# Stripping KERNELRELEASE from the env restores the expected dispatch:
# outer branch runs, recurses into /lib/modules/$kernelver/build,
# kbuild sets KERNELRELEASE itself for the recursive call, inner branch
# runs with obj-m, build succeeds.

PACKAGE_NAME="sgil1"
PACKAGE_VERSION="5.0"

BUILT_MODULE_NAME[0]="sgil1"
DEST_MODULE_LOCATION[0]="/updates"

MAKE[0]="env -u KERNELRELEASE make KERNEL_VERSION=${kernelver}"
CLEAN="env -u KERNELRELEASE make KERNEL_VERSION=${kernelver} clean"

AUTOINSTALL="yes"
